# =====================================================================
# Infrastructure-only stack for local dev.
#
#   docker compose up -d            # bring up postgres + redis + kafka
#   docker compose down             # stop + remove containers
#   docker compose down -v          # + wipe data volumes
#
# Services (eureka-server / auth-service / api-gateway) run on the host
# via `mvn spring-boot:run` and connect to these containers via localhost.
# =====================================================================

services:
  # One Postgres instance per service — isolation + easy per-service backup/restore.
  # Host ports: auth=5433, catalog=5434 (increment by 1 for each new service).
  postgres-auth:
    image: postgres:16-alpine
    container_name: hieu-postgres-auth
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: authpass
    ports:
      - "5433:5432"
    volumes:
      - pgdata-auth:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authuser -d authdb"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-catalog:
    image: postgres:16-alpine
    container_name: hieu-postgres-catalog
    environment:
      POSTGRES_DB: catalogdb
      POSTGRES_USER: cataloguser
      POSTGRES_PASSWORD: catalogpass
    ports:
      - "5434:5432"
    volumes:
      - pgdata-catalog:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cataloguser -d catalogdb"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-cart:
    image: postgres:16-alpine
    container_name: hieu-postgres-cart
    environment:
      POSTGRES_DB: cartdb
      POSTGRES_USER: cartuser
      POSTGRES_PASSWORD: cartpass
    ports:
      - "5435:5432"
    volumes:
      - pgdata-cart:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cartuser -d cartdb"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-order:
    image: postgres:16-alpine
    container_name: hieu-postgres-order
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: orderuser
      POSTGRES_PASSWORD: orderpass
    ports:
      - "5436:5432"
    volumes:
      - pgdata-order:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderuser -d orderdb"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-payment:
    image: postgres:16-alpine
    container_name: hieu-postgres-payment
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: paymentuser
      POSTGRES_PASSWORD: paymentpass
    ports:
      - "5437:5432"
    volumes:
      - pgdata-payment:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paymentuser -d paymentdb"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-shipping:
    image: postgres:16-alpine
    container_name: hieu-postgres-shipping
    environment:
      POSTGRES_DB: shippingdb
      POSTGRES_USER: shippinguser
      POSTGRES_PASSWORD: shippingpass
    ports:
      - "5438:5432"
    volumes:
      - pgdata-shipping:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shippinguser -d shippingdb"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-inventory:
    image: postgres:16-alpine
    container_name: hieu-postgres-inventory
    environment:
      POSTGRES_DB: inventorydb
      POSTGRES_USER: inventoryuser
      POSTGRES_PASSWORD: inventorypass
    ports:
      - "5439:5432"
    volumes:
      - pgdata-inventory:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventoryuser -d inventorydb"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-flashsale:
    image: postgres:16-alpine
    container_name: hieu-postgres-flashsale
    environment:
      POSTGRES_DB: flashsaledb
      POSTGRES_USER: flashsaleuser
      POSTGRES_PASSWORD: flashsalepass
    ports:
      - "5440:5432"
    volumes:
      - pgdata-flashsale:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashsaleuser -d flashsaledb"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-notification:
    image: postgres:16-alpine
    container_name: hieu-postgres-notification
    environment:
      POSTGRES_DB: notificationdb
      POSTGRES_USER: notificationuser
      POSTGRES_PASSWORD: notificationpass
    ports:
      - "5441:5432"
    volumes:
      - pgdata-notification:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notificationuser -d notificationdb"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-userprofile:
    image: postgres:16-alpine
    container_name: hieu-postgres-userprofile
    environment:
      POSTGRES_DB: userprofiledb
      POSTGRES_USER: userprofileuser
      POSTGRES_PASSWORD: userprofilepass
    ports:
      - "5442:5432"
    volumes:
      - pgdata-userprofile:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U userprofileuser -d userprofiledb"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-voucher:
    image: postgres:16-alpine
    container_name: hieu-postgres-voucher
    environment:
      POSTGRES_DB: voucherdb
      POSTGRES_USER: voucheruser
      POSTGRES_PASSWORD: voucherpass
    ports:
      - "5443:5432"
    volumes:
      - pgdata-voucher:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voucheruser -d voucherdb"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: hieu-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

  redis:
    image: redis:7-alpine
    container_name: hieu-redis
    ports: ["6379:6379"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Apache Kafka 3.8 in KRaft mode — no Zookeeper required.
  # Official apache/kafka image runs controller + broker in a single process.
  kafka:
    image: apache/kafka:3.8.0
    container_name: hieu-kafka
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: MkU3OEVCNTcwNTJENDM2Qk
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Single-broker dev defaults
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: hieu-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Kibana — dashboards for analytics-events-* and logs-* indices.
  kibana:
    image: docker.elastic.co/kibana/kibana:9.0.0
    container_name: hieu-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_HOST=0.0.0.0
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15

  # Filebeat — scrape Docker container stdout/stderr → ES index logs-YYYY.MM.dd.
  filebeat:
    image: docker.elastic.co/beats/filebeat:9.0.0
    container_name: hieu-filebeat
    user: root
    command: ["filebeat", "-e", "--strict.perms=false"]
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./logs:/var/log/services:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - filebeatdata:/usr/share/filebeat/data
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  pgdata-auth:
  pgdata-catalog:
  pgdata-cart:
  pgdata-order:
  pgdata-payment:
  pgdata-shipping:
  pgdata-inventory:
  pgdata-flashsale:
  pgdata-notification:
  pgdata-userprofile:
  pgdata-voucher:
  redisdata:
  kafkadata:
  esdata:
  filebeatdata:
