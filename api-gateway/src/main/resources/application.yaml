server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cloud:
    gateway:
      # Spring Cloud Gateway 2025.x splits webflux + webmvc; server.webflux prefix
      # replaces the old top-level `spring.cloud.gateway.*` for reactive.
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          routes:
            # ── Auth Service — public endpoints ────────────────────────
            - id: auth-service-public
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/login,/api/auth/register,/api/auth/refresh

            # ── Auth Service — protected endpoints (require JWT) ───────
            - id: auth-service-protected
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/me,/api/auth/logout,/api/auth/change-password,/api/users/**
              filters:
                - name: JwtAuthenticationFilter

            # ── Auth Service — Swagger aggregation ─────────────────────
            - id: auth-service-api-docs
              uri: lb://auth-service
              predicates:
                - Path=/v3/api-docs/auth-service
              filters:
                - RewritePath=/v3/api-docs/auth-service, /v3/api-docs

            # ── Catalog Service — public reads (GET) ───────────────────
            - id: catalog-service-public-reads
              uri: lb://catalog-service
              predicates:
                - Path=/api/products/**,/api/categories/**,/api/attrs/**,/api/variants/**
                - Method=GET

            # ── Catalog Service — writes (JWT required) ────────────────
            - id: catalog-service-writes
              uri: lb://catalog-service
              predicates:
                - Path=/api/products/**,/api/categories/**,/api/attrs/**,/api/variants/**
                - Method=POST,PUT,PATCH,DELETE
              filters:
                - name: JwtAuthenticationFilter

            # ── Catalog Service — Swagger aggregation ──────────────────
            - id: catalog-service-api-docs
              uri: lb://catalog-service
              predicates:
                - Path=/v3/api-docs/catalog-service
              filters:
                - RewritePath=/v3/api-docs/catalog-service, /v3/api-docs

            # ── Cart Service — all endpoints require JWT ───────────────
            - id: cart-service
              uri: lb://cart-service
              predicates:
                - Path=/api/cart/**
              filters:
                - name: JwtAuthenticationFilter

            # ── Order Service — writes + reads require JWT ─────────────
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**
              filters:
                - name: JwtAuthenticationFilter

            # ── Payment Service — webhook public, rest JWT ─────────────
            - id: payment-service-webhook
              uri: lb://payment-service
              predicates:
                - Path=/api/payments/sepay/webhook,/api/payments/momo/webhook
                - Method=POST

            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/payments/**
              filters:
                - name: JwtAuthenticationFilter

            # ── Flash-Sale Service — public browsing, participate+admin JWT ──
            - id: flash-sale-service-public
              uri: lb://flash-sale-service
              predicates:
                - Path=/api/flash-sales/active,/api/flash-sales/{id},/api/flash-sales/{id}/availability
                - Method=GET

            - id: flash-sale-service
              uri: lb://flash-sale-service
              predicates:
                - Path=/api/flash-sales/**
              filters:
                - name: JwtAuthenticationFilter

            # ── Search Service — public search + suggest, admin index ─────────
            - id: search-service-public
              uri: lb://search-service
              predicates:
                - Path=/api/search,/api/search/suggest
                - Method=GET,POST

            - id: search-service-admin
              uri: lb://search-service
              predicates:
                - Path=/api/search/index/**
              filters:
                - name: JwtAuthenticationFilter

            # ── Voucher Service — public reads (active list + by-code) + validate/release; admin writes ──
            - id: voucher-service-public
              uri: lb://voucher-service
              predicates:
                - Path=/api/vouchers/active,/api/vouchers/code/**

            - id: voucher-service-protected
              uri: lb://voucher-service
              predicates:
                - Path=/api/vouchers/**
              filters:
                - name: JwtAuthenticationFilter

            # ── Analytics Service — admin-only summary endpoint (Kibana is the main UI) ──
            - id: analytics-service
              uri: lb://analytics-service
              predicates:
                - Path=/api/analytics/**
              filters:
                - name: JwtAuthenticationFilter

            # ── Notification Service — SSE stream public-token, rest JWT ─────
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**
              filters:
                - name: JwtAuthenticationFilter

            # ── Inventory Service — reserve/confirm/release internal, rest JWT ─
            - id: inventory-service-internal
              uri: lb://inventory-service
              predicates:
                - Path=/api/inventory/reserve,/api/inventory/confirm,/api/inventory/release
                - Method=POST

            - id: inventory-service
              uri: lb://inventory-service
              predicates:
                - Path=/api/inventory/**
              filters:
                - name: JwtAuthenticationFilter

            # ── Shipping Service — tracking public, rest JWT ───────────
            - id: shipping-service-tracking
              uri: lb://shipping-service
              predicates:
                - Path=/api/shipments/tracking/**
                - Method=GET

            - id: shipping-service
              uri: lb://shipping-service
              predicates:
                - Path=/api/shipments/**
              filters:
                - name: JwtAuthenticationFilter

          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://admin:admin123@localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# ── JWT (shared secret with auth-service for signature verification) ──
jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-please-32chars}

# ── Resilience4j circuit breaker ──
resilience4j:
  circuitbreaker:
    instances:
      defaultCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
  timelimiter:
    instances:
      defaultCircuitBreaker:
        timeoutDuration: 3s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,prometheus
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always

# ── OpenAPI aggregation ──
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /v3/api-docs/auth-service
  api-docs:
    enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.hieu.api_gateway: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{30} - %msg%n"
