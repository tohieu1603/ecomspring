spring:
  # Auto-load .env as properties (Spring Boot 3.1+) — file is optional.
  config:
    import: optional:file:.env[.properties]
  application:
    name: catalog-service

  grpc:
    server:
      port: ${GRPC_PORT:9093}

  datasource:
    # Catalog has its own Postgres on host port 5434 (auth uses 5433).
    # Isolation per service keeps backup/restore / schema migration independent.
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:5434/catalogdb}
    username: ${DB_USER:cataloguser}
    password: ${DB_PASSWORD:catalogpass}

  jpa:
    database-platform: ${JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
    hibernate:
      ddl-auto: ${JPA_DDL:validate}
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer:   org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
    listener:
      missing-topics-fatal: false

server:
  port: ${SERVER_PORT:8083}

# ── JWT verification (shared secret with auth-service) ──
jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-please-32chars}

# ── Eureka ──
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://admin:admin123@localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# ── OpenAPI ──
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.hieu.catalog_service: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{30} - %msg%n"
