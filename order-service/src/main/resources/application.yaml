spring:
  threads:
    virtual:
      enabled: true     # Java 25 virtual threads for Tomcat + @Async + sagaExecutor

  application:
    name: order-service

  grpc:
    server:
      port: ${GRPC_PORT:9095}

  datasource:
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:5436/orderdb}
    username: ${DB_USER:orderuser}
    password: ${DB_PASSWORD:orderpass}

  jpa:
    database-platform: ${JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
    hibernate:
      ddl-auto: ${JPA_DDL:validate}
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      # Idempotency Lua claim sits on the request thread — keep timeouts tight so a
      # Redis hiccup fails fast instead of pinning saga workers.
      timeout: 1s
      connect-timeout: 500ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 500ms
        shutdown-timeout: 100ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: latest
      properties:
        # Ignore __TypeId__ headers — payment/shipping publish without them. Deserialise
        # straight into Map<String,Object>; listeners read fields defensively.
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.HashMap
        spring.json.trusted.packages: "*"
    listener:
      missing-topics-fatal: false

server:
  port: ${SERVER_PORT:8085}

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-please-32chars}

security:
  internal-token: ${INTERNAL_TOKEN:change-me-internal-token-min-32-chars-please}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://admin:admin123@localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

grpc:
  client:
    catalog:
      address: ${CATALOG_GRPC_ADDRESS:localhost:9093}
    cart:
      address: ${CART_GRPC_ADDRESS:localhost:9094}
    inventory:
      address: ${INVENTORY_GRPC_ADDRESS:localhost:9098}

# REST companions to gRPC — used where gRPC is unavailable (payment-service) or as fallback.
services:
  catalog-url:   ${CATALOG_SERVICE_URL:http://localhost:8083}
  cart-url:      ${CART_SERVICE_URL:http://localhost:8084}
  payment-url:   ${PAYMENT_SERVICE_URL:http://localhost:8086}
  shipping-url:  ${SHIPPING_SERVICE_URL:http://localhost:8087}
  inventory-url: ${INVENTORY_SERVICE_URL:http://localhost:8088}
  voucher-url:   ${VOUCHER_SERVICE_URL:http://localhost:8094}

outbox:
  poll-delay-ms: 500
  # Cap batch so worst-case Kafka stall (batch-size × send-timeout) stays under
  # Hikari's pool-keepalive — prevents pool starvation when broker is degraded.
  batch-size: 25

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.hieu.order_service: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{30} - %msg%n"
