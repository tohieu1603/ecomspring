spring:
  # Auto-load .env as properties (Spring Boot 3.1+) — file is optional.
  config:
    import: optional:file:.env[.properties]
  application:
    name: analytics-service

  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}
    connection-timeout: 5s
    socket-timeout: 30s

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: analytics-service
      auto-offset-reset: earliest
      # Disable auto-commit; offset committed only after indexer.index() succeeds
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.HashMap
        spring.json.trusted.packages: "*"
    listener:
      missing-topics-fatal: false
      # MANUAL_IMMEDIATE: ack immediately after indexer.index() so no data loss on pod restart
      ack-mode: MANUAL_IMMEDIATE

server:
  port: ${SERVER_PORT:8095}

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-please-32chars}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://admin:admin123@localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

analytics:
  index-prefix: ${ANALYTICS_INDEX_PREFIX:analytics-events}
  retention-days: 90
  retention-cron: "0 30 2 * * *"

logging:
  level:
    com.hieu.analytics_service: DEBUG
