spring:
  application:
    name: cart-service

  grpc:
    server:
      port: ${GRPC_PORT:9094}

  datasource:
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:5435/cartdb}
    username: ${DB_USER:cartuser}
    password: ${DB_PASSWORD:cartpass}

  jpa:
    database-platform: ${JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
    hibernate:
      ddl-auto: ${JPA_DDL:validate}
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: cart-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.HashMap
        spring.json.trusted.packages: "*"
    listener:
      missing-topics-fatal: false

server:
  port: ${SERVER_PORT:8084}

# ── JWT verification ──
jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-please-32chars}

# ── Eureka ──
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://admin:admin123@localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# ── gRPC client: catalog-service ──
spring.grpc:
  client:
    catalog-service:
      address: ${CATALOG_GRPC_ADDRESS:static://127.0.0.1:9093}
      negotiation-type: plaintext

# ── REST companion to gRPC for catalog revalidation ──
services:
  catalog-url: ${CATALOG_SERVICE_URL:http://localhost:8083}

# ── CORS ──
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}

# ── OpenAPI ──
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.hieu.cart_service: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{30} - %msg%n"
